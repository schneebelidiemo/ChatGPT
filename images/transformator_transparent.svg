    <!-- top cover -->
    <path d="M250 256 H676 L700 280 H230 Z" fill="#dbe2e5" stroke-width="3"/>
    <g fill="#9aa5aa" stroke="#4c5559" stroke-width="2">
      <circle cx="286" cy="269" r="5"/><circle cx="326" cy="269" r="5"/><circle cx="366" cy="269" r="5"/><circle cx="406" cy="269" r="5"/>
      <circle cx="446" cy="269" r="5"/><circle cx="486" cy="269" r="5"/><circle cx="526" cy="269" r="5"/><circle cx="566" cy="269" r="5"/><circle cx="606" cy="269" r="5"/><circle cx="646" cy="269" r="5"/>
    </g>

