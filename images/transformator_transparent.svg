        <path d="M32 0 l10 34 h-20 Z" fill="#cbd3d6"/>
        <line x1="32" y1="-16" x2="32" y2="0" stroke="#50595e"/>
        <g fill="#242424"><ellipse cx="32" cy="45" rx="21" ry="7"/><ellipse cx="32" cy="62" rx="25" ry="8"/><ellipse cx="32" cy="80" rx="27" ry="8"/><ellipse cx="32" cy="98" rx="24" ry="8"/><ellipse cx="32" cy="116" rx="20" ry="7"/></g>
        <rect x="11" y="120" width="42" height="26" rx="4" fill="#cfd7da"/>
      </g>
      <g transform="translate(532 95)">
        <path d="M32 0 l11 38 h-22 Z" fill="#cbd3d6"/>
        <line x1="32" y1="-20" x2="32" y2="0" stroke="#50595e"/>
        <g fill="#1f1f1f"><ellipse cx="32" cy="50" rx="22" ry="7"/><ellipse cx="32" cy="70" rx="27" ry="8"/><ellipse cx="32" cy="91" rx="30" ry="9"/><ellipse cx="32" cy="112" rx="27" ry="8"/><ellipse cx="32" cy="132" rx="22" ry="7"/></g>
        <rect x="10" y="137" width="44" height="28" rx="4" fill="#cfd7da"/>
      </g>
      <g transform="translate(625 115)">
        <path d="M32 0 l10 34 h-20 Z" fill="#cbd3d6"/>
        <line x1="32" y1="-18" x2="32" y2="0" stroke="#50595e"/>
        <g fill="#202020"><ellipse cx="32" cy="45" rx="21" ry="7"/><ellipse cx="32" cy="64" rx="26" ry="8"/><ellipse cx="32" cy="83" rx="28" ry="8"/><ellipse cx="32" cy="102" rx="25" ry="8"/><ellipse cx="32" cy="121" rx="20" ry="7"/></g>
        <rect x="11" y="126" width="42" height="26" rx="4" fill="#cfd7da"/>
      </g>
      <g fill="#2a2a2a">
        <ellipse cx="371" cy="246" rx="18" ry="6"/><ellipse cx="407" cy="244" rx="18" ry="6"/>
        <ellipse cx="453" cy="244" rx="18" ry="6"/><ellipse cx="493" cy="243" rx="18" ry="6"/>
      </g>
    </g>

    <!-- side details -->
    <rect x="548" y="367" width="57" height="80" rx="4" fill="#c4ccd0" stroke-width="2"/>
    <rect x="620" y="355" width="37" height="44" rx="3" fill="#879399" stroke-width="2"/>
    <circle cx="391" cy="613" r="10" fill="#778288" stroke-width="2"/>
    <circle cx="630" cy="625" r="9" fill="#b6c0c5" stroke-width="2"/>
    <path d="M645 612 h34 v22 h-34 Z" fill="#c8d1d5" stroke-width="2"/>
    <circle cx="673" cy="606" r="8" fill="#b02b2b" stroke="#5a1919" stroke-width="2"/>

    <!-- base feet -->
    <g fill="#b7c0c4" stroke-width="3">
      <path d="M224 604 h95 l-22 32 h-83 Z"/>
      <path d="M469 604 h112 l-28 34 h-98 Z"/>
      <path d="M83 601 h72 l-20 29 H70 Z"/>
    </g>
  </g>
</svg>