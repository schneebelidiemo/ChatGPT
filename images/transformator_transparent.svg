<svg width="760" height="720" viewBox="0 0 760 720" xmlns="http://www.w3.org/2000/svg">
  <title>Transformator transparent</title>
  <defs>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f4f7f8"/>
      <stop offset="0.55" stop-color="#cfd7da"/>
      <stop offset="1" stop-color="#8f999e"/>
    </linearGradient>
    <linearGradient id="darkMetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dce3e5"/>
      <stop offset="1" stop-color="#7f8a8f"/>
    </linearGradient>
    <linearGradient id="oilTank" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d7dee1"/>
      <stop offset="0.5" stop-color="#aeb8bd"/>
      <stop offset="1" stop-color="#7e898e"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="12" dy="18" stdDeviation="10" flood-color="#000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)" stroke="#515b60" stroke-linejoin="round" stroke-linecap="round">
    <!-- main transformer tank -->
    <path d="M282 290 H662 L690 315 V573 L648 606 H300 L268 574 V318 Z" fill="url(#metal)" stroke-width="3"/>
    <path d="M294 345 H675" stroke="#8b969a" stroke-width="5" opacity="0.55"/>
    <path d="M300 454 H676" stroke="#8b969a" stroke-width="5" opacity="0.55"/>

    <!-- right radiator bank -->
    <g fill="#c7d0d4" stroke-width="2">
      <rect x="666" y="307" width="14" height="252" rx="2"/>
      <rect x="685" y="310" width="14" height="240" rx="2"/>
      <rect x="704" y="315" width="14" height="225" rx="2"/>
      <rect x="723" y="322" width="12" height="205" rx="2"/>
    </g>

    <!-- front radiator panels -->
    <g fill="url(#darkMetal)" stroke-width="2.4">
      <rect x="84" y="297" width="55" height="315" rx="7"/>
      <rect x="152" y="306" width="55" height="301" rx="7"/>
      <rect x="221" y="315" width="55" height="285" rx="7"/>
    </g>
    <g stroke="#566166" stroke-width="3">
      <line x1="105" y1="324" x2="105" y2="585"/><line x1="122" y1="324" x2="122" y2="585"/>
      <line x1="173" y1="331" x2="173" y2="582"/><line x1="190" y1="331" x2="190" y2="582"/>
      <line x1="242" y1="338" x2="242" y2="574"/><line x1="259" y1="338" x2="259" y2="574"/>
    </g>
    <g fill="#e9eef0" stroke-width="2">
      <circle cx="82" cy="312" r="13"/><circle cx="151" cy="320" r="13"/><circle cx="220" cy="329" r="13"/>
      <circle cx="85" cy="596" r="13"/><circle cx="153" cy="591" r="13"/><circle cx="221" cy="586" r="13"/>
    </g>

    <!-- center cooling fins -->
    <g fill="#b8c2c7" stroke="#5c666b" stroke-width="2">
      <rect x="305" y="340" width="14" height="214"/><rect x="327" y="340" width="14" height="214"/>
      <rect x="349" y="340" width="14" height="214"/><rect x="371" y="340" width="14" height="214"/>
      <rect x="393" y="340" width="14" height="214"/><rect x="415" y="340" width="14" height="214"/>
      <rect x="437" y="340" width="14" height="214"/>
