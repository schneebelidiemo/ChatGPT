    <!-- small mechanisms on top -->
    <g fill="#b6c0c5" stroke="#515b60" stroke-width="2">
      <rect x="294" y="196" width="66" height="51" rx="5"/>
      <rect x="368" y="204" width="40" height="42" rx="4"/>
      <rect x="246" y="211" width="42" height="38" rx="4"/>
      <path d="M307 194 v-35 h21 v35"/>
      <circle cx="339" cy="248" r="12" fill="#e9eef0"/>
