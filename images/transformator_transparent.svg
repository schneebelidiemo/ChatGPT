    <path d="M118 104 H185 V270 H92 V140 Z" fill="#e5ecef" stroke-width="3"/>
    <path d="M356 138 H425 V268 H337 V166 Z" fill="#d9e1e4" stroke-width="3"/>

    <!-- oil conservator cylinder -->
    <g stroke-width="3">
      <path d="M145 74 H337 C371 74 392 95 392 128 V159 C392 193 371 214 337 214 H145 Z" fill="url(#oilTank)"/>
      <ellipse cx="145" cy="144" rx="45" ry="70" fill="#edf3f5"/>
      <ellipse cx="145" cy="144" rx="35" ry="58" fill="#d5dde1"/>
      <circle cx="145" cy="144" r="4" fill="#697378"/>
      <g fill="#7d878c">
        <circle cx="145" cy="83" r="4"/><circle cx="176" cy="95" r="4"/><circle cx="184" cy="144" r="4"/>
        <circle cx="172" cy="191" r="4"/><circle cx="145" cy="203" r="4"/><circle cx="114" cy="191" r="4"/>
        <circle cx="104" cy="144" r="4"/><circle cx="113" cy="96" r="4"/>
      </g>
      <path d="M331 70 l20 -13 h20" fill="none" stroke="#626d72"/>
